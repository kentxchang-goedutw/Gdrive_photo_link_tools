<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive 圖片連結提取器 (現代化版)</title>
    <!-- 使用 CDN 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 CDN 載入 React 和相關工具 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .icon-svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
        input:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                image: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                code: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
                help: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
                search: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                alert: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
                globe: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
                download: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                external: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
                check: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
                copy: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
                settings: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                x: <svg className={`${className} icon-svg`} viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [folderUrl, setFolderUrl] = useState('');
            // 從 localStorage 初始化 gasUrl
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('gdrive_extractor_gas_url') || '');
            const [files, setFiles] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [copiedId, setCopiedId] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showInstructions, setShowInstructions] = useState(false);

            // 當 gasUrl 變動時儲存到本地
            useEffect(() => {
                localStorage.setItem('gdrive_extractor_gas_url', gasUrl);
            }, [gasUrl]);

            const extractFolderId = (url) => {
                const match = url.match(/folders\/([\w-]+)/);
                return match ? match[1] : url.trim();
            };

            const getDownloadLink = (id) => `https://drive.google.com/uc?export=view&id=${id}`;
            const getEmbedLink = (id) => `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;

            const fetchImages = async () => {
                const folderId = extractFolderId(folderUrl);
                
                if (!gasUrl) {
                    setError('尚未設定 GAS 部署網址，請先點擊設定按鈕進行設定。');
                    setShowSettings(true);
                    return;
                }

                if (!folderId) {
                    setError('請輸入雲端資料夾連結');
                    return;
                }

                setLoading(true);
                setError(null);
                setFiles([]);

                try {
                    const response = await fetch(`${gasUrl}?folderId=${folderId}`);
                    const data = await response.json();
                    if (data.status === 'error') throw new Error(data.message);
                    if (!data.files || data.files.length === 0) {
                        setError('找不到圖片檔案，請確認資料夾權限是否已開啟為「所有人」。');
                    } else {
                        setFiles(data.files);
                    }
                } catch (err) {
                    setError(`抓取失敗：請檢查 GAS 網址是否正確並已部署為所有人存取。`);
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = (text, id) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) { console.error(err); }
                document.body.removeChild(textArea);
            };

            const copyAllLinks = (type) => {
                const allLinks = files.map(f => type === 'embed' ? getEmbedLink(f.id) : getDownloadLink(f.id)).join('\n');
                copyToClipboard(allLinks, `all-${type}`);
            };

            const gasScript = `function doGet(e) {
  const folderId = e.parameter.folderId;
  const folder = DriveApp.getFolderById(folderId);
  const files = folder.getFiles();
  const results = [];
  while (files.hasNext()) {
    const file = files.next();
    const mime = file.getMimeType();
    if (mime.includes('image/')) {
      results.push({ id: file.getId(), name: file.getName(), mimeType: mime });
    }
  }
  return ContentService.createTextOutput(JSON.stringify({status: 'success', files: results}))
    .setMimeType(ContentService.MimeType.JSON);
}`;

            return (
                <div className="py-12 px-4 max-w-5xl mx-auto">
                    {/* Header Section */}
                    <header className="mb-12 text-center relative">
                        <div className="absolute right-0 top-0">
                            <button 
                                onClick={() => setShowSettings(true)}
                                className="p-3 bg-white text-slate-500 hover:text-indigo-600 rounded-2xl shadow-sm border border-slate-200 transition-all active:scale-95"
                                title="開啟設定"
                            >
                                <Icon name="settings" className="w-6 h-6" />
                            </button>
                        </div>
                        <div className="inline-flex p-3 bg-indigo-100 rounded-2xl mb-4 text-indigo-600">
                            <Icon name="image" className="w-10 h-10" />
                        </div>
                        <h1 className="text-4xl font-bold text-slate-800 tracking-tight mb-2">Google Drive 圖片連結提取器</h1>
                        <p className="text-slate-500 font-medium tracking-wide">快速取得雲端硬碟圖片的直接嵌入網址</p>
                    </header>

                    {/* Main Config Area */}
                    <div className="glass-card rounded-3xl p-8 mb-10 transition-all">
                        <div className="space-y-6">
                            <div className="space-y-3">
                                <label className="text-sm font-bold text-slate-700 uppercase tracking-widest flex items-center gap-2">
                                    雲端資料夾連結
                                    {!gasUrl && <span className="text-[10px] bg-red-100 text-red-500 px-2 py-0.5 rounded-full font-normal">尚未設定 GAS</span>}
                                </label>
                                <input
                                    type="text"
                                    placeholder="貼上 Google Drive 資料夾網址 (例如：https://drive.google.com/drive/folders/...)"
                                    className="w-full bg-white/50 border border-slate-200 px-5 py-4 rounded-2xl text-slate-600 outline-none transition-all focus:border-indigo-500 focus:bg-white text-lg"
                                    value={folderUrl}
                                    onChange={(e) => setFolderUrl(e.target.value)}
                                />
                            </div>

                            <button
                                onClick={fetchImages}
                                disabled={loading}
                                className={`w-full py-4 rounded-2xl font-bold text-white transition-all transform active:scale-95 shadow-xl shadow-indigo-200 flex items-center justify-center gap-2 ${loading ? 'bg-indigo-300' : 'bg-indigo-600 hover:bg-indigo-700'}`}
                            >
                                {loading ? (
                                    <div className="w-6 h-6 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>
                                ) : (
                                    <React.Fragment><Icon name="search" /> 立即抓取圖片</React.Fragment>
                                )}
                            </button>
                        </div>

                        {error && (
                            <div className="mt-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl flex items-center gap-3 text-sm font-medium">
                                <Icon name="alert" /> {error}
                            </div>
                        )}
                    </div>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="settings" className="w-5 h-5 text-indigo-500" /> 系統設置
                                    </h3>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600 p-1">
                                        <Icon name="x" />
                                    </button>
                                </div>
                                <div className="p-8 space-y-6">
                                    <div className="space-y-3">
                                        <label className="text-sm font-bold text-slate-700 uppercase tracking-widest flex justify-between">
                                            GAS 部署網址
                                            <button 
                                                onClick={() => setShowInstructions(!showInstructions)}
                                                className="text-indigo-500 text-[10px] hover:underline"
                                            >
                                                如何取得？
                                            </button>
                                        </label>
                                        <input
                                            type="text"
                                            placeholder="https://script.google.com/macros/s/.../exec"
                                            className="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl text-slate-600 outline-none focus:border-indigo-500 focus:bg-white"
                                            value={gasUrl}
                                            onChange={(e) => setGasUrl(e.target.value)}
                                        />
                                        <p className="text-[10px] text-slate-400">設定後將自動儲存於您的瀏覽器，下次開啟無需重複輸入。</p>
                                    </div>

                                    {showInstructions && (
                                        <div className="p-4 bg-slate-900 rounded-2xl text-slate-300 text-[11px] border border-slate-700 animate-in slide-in-from-top-2">
                                            <p className="mb-2 text-white font-bold">腳本設定說明：</p>
                                            <ol className="list-decimal ml-4 space-y-1 mb-3 text-slate-400">
                                                <li>至 GAS 建立新專案。</li>
                                                <li>部署為「網頁應用程式」。</li>
                                                <li>「誰有權存取」選「所有人」。</li>
                                            </ol>
                                            <div className="relative group">
                                                <pre className="bg-slate-800 p-3 rounded-lg overflow-x-auto text-indigo-300 font-mono text-[10px] max-h-32">{gasScript}</pre>
                                                <button 
                                                    onClick={() => copyToClipboard(gasScript, 'script')}
                                                    className="absolute top-2 right-2 p-1.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-all"
                                                >
                                                    <Icon name={copiedId === 'script' ? 'check' : 'copy'} className="w-3.5 h-3.5" />
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    <button 
                                        onClick={() => setShowSettings(false)}
                                        className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition-all"
                                    >
                                        完成並關閉
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Result Display */}
                    {files.length > 0 && (
                        <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-left">
                                    <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-3">
                                        已發現 {files.length} 張圖片
                                    </h2>
                                    <p className="text-slate-400 text-sm">點擊下方按鈕可快速批次複製</p>
                                </div>
                                <div className="flex gap-3 w-full md:w-auto">
                                    <button 
                                        onClick={() => copyAllLinks('embed')} 
                                        className="flex-1 md:flex-none px-6 py-3 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 transition-all"
                                    >
                                        <Icon name={copiedId === 'all-embed' ? 'check' : 'globe'} /> 複製全部嵌入碼
                                    </button>
                                    <button 
                                        onClick={() => copyAllLinks('download')} 
                                        className="flex-1 md:flex-none px-6 py-3 bg-slate-800 text-white text-sm font-bold rounded-xl hover:bg-slate-900 shadow-lg shadow-slate-200 flex items-center justify-center gap-2 transition-all"
                                    >
                                        <Icon name={copiedId === 'all-download' ? 'check' : 'download'} /> 批次下載連結
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                                {files.map((file) => (
                                    <div key={file.id} className="image-card bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden group hover:shadow-xl hover:border-indigo-100 transition-all">
                                        <div className="aspect-[4/3] bg-slate-50 relative overflow-hidden">
                                            <img 
                                                src={getEmbedLink(file.id)} 
                                                alt={file.name} 
                                                className="w-full h-full object-cover transition-transform duration-700" 
                                                loading="lazy" 
                                            />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                                <a 
                                                    href={getEmbedLink(file.id)} 
                                                    target="_blank" 
                                                    className="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white hover:bg-white hover:text-indigo-600 transition-all"
                                                >
                                                    <Icon name="external" />
                                                </a>
                                            </div>
                                        </div>
                                        <div className="p-5">
                                            <h3 className="text-sm font-bold text-slate-700 truncate mb-4" title={file.name}>{file.name}</h3>
                                            <div className="grid grid-cols-2 gap-2">
                                                <button 
                                                    onClick={() => copyToClipboard(getEmbedLink(file.id), `${file.id}-embed`)} 
                                                    className={`py-2.5 px-2 rounded-xl text-[11px] font-bold flex items-center justify-center gap-2 border transition-all ${copiedId === `${file.id}-embed` ? 'bg-green-50 border-green-200 text-green-600' : 'bg-indigo-50 border-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}
                                                >
                                                    <Icon name={copiedId === `${file.id}-embed` ? 'check' : 'globe'} className="w-3.5 h-3.5" /> 嵌入網址
                                                </button>
                                                <button 
                                                    onClick={() => copyToClipboard(getDownloadLink(file.id), `${file.id}-dl`)} 
                                                    className={`py-2.5 px-2 rounded-xl text-[11px] font-bold flex items-center justify-center gap-2 border transition-all ${copiedId === `${file.id}-dl` ? 'bg-green-50 border-green-200 text-green-600' : 'bg-slate-50 border-slate-100 text-slate-600 hover:bg-slate-100'}`}
                                                >
                                                    <Icon name={copiedId === `${file.id}-dl` ? 'check' : 'download'} className="w-3.5 h-3.5" /> 下載連結
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    
                    <footer className="mt-12 py-16 border-t border-slate-200 text-center">
                        <div className="mb-6">
                            <span className="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mb-4 block">Product Of</span>
                            <a 
                                href="https://kentxchang.blogspot.tw" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="inline-flex items-center gap-2 px-6 py-2 bg-white border border-slate-200 rounded-full text-slate-700 font-bold hover:border-indigo-300 hover:text-indigo-600 transition-all shadow-sm"
                            >
                                Made by 阿剛老師
                            </a>
                        </div>
                        <div className="flex flex-col items-center gap-3 opacity-60">
                            <img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-sa.svg" alt="CC BY-NC-SA" className="h-7" />
                            <p className="text-xs text-slate-500 font-medium">姓名標示 - 非商業性 - 相同方式分享</p>
                            <p className="text-[10px] text-slate-400 leading-relaxed max-w-sm">
                                註：此工具僅提取圖片元數據，圖片本身儲存於您的 Google Drive。預覽採用穩定快取格式，以解決原始 {'<img>'} 標籤的顯示限制。
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
